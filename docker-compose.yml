services:

  # ──────────────────────────────────────────────
  # Database
  # ──────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MARIADB_HOST_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # API Gateway / Reverse Proxy  →  localhost:3000
  # ──────────────────────────────────────────────
  rest-api:
    build: ./rest-api
    ports:
      - "${REST_API_PORT}:${REST_API_PORT}"
    environment:
      PORT: ${REST_API_PORT}
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      USERS_API_URL: http://users-api:${USERS_API_PORT}
      SESSIONS_API_URL: http://sessions-api:${SESSIONS_API_PORT}
      GIT_AGENT_URL: http://git-agent:${GIT_AGENT_PORT}
    volumes:
      - ./rest-api:/app
      - /app/node_modules
    depends_on:
      - users-api
      - sessions-api
      - git-agent

  # ──────────────────────────────────────────────
  # Users API  →  localhost:6024
  # ──────────────────────────────────────────────
  users-api:
    build: ./users-api
    ports:
      - "${USERS_API_PORT}:${USERS_API_PORT}"
    environment:
      PORT: ${USERS_API_PORT}
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST}:${MYSQL_INTERNAL_PORT}/${USERS_DB}"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - ./users-api:/app
      - /app/node_modules
    depends_on:
      mariadb:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Sessions API  →  localhost:6023
  # ──────────────────────────────────────────────
  sessions-api:
    build: ./sessions-api
    ports:
      - "${SESSIONS_API_PORT}:${SESSIONS_API_PORT}"
    environment:
      PORT: ${SESSIONS_API_PORT}
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST}:${MYSQL_INTERNAL_PORT}/${SESSIONS_DB}"
    volumes:
      - ./sessions-api:/app
      - /app/node_modules
    depends_on:
      mariadb:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Git Agent (Rust)  →  localhost:6025
  # ──────────────────────────────────────────────
  git-agent:
    build: ./git-agent
    ports:
      - "${GIT_AGENT_PORT}:${GIT_AGENT_PORT}"
    environment:
      PORT: ${GIT_AGENT_PORT}
      JWT_SECRET: ${JWT_SECRET}
      REPOS_DIR: ${GIT_AGENT_REPOS_DIR}
    volumes:
      - ./git-agent:/app

  # ──────────────────────────────────────────────
  # Frontend (Vite + React)  →  localhost:5173
  # ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      # Vite inlines VITE_* vars at dev-server startup.
      # Browsers connect to localhost:3000, so this stays as-is.
      VITE_API_URL: ${REST_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - rest-api

  # ──────────────────────────────────────────────
  # Docs (Docusaurus)  →  localhost:6054
  # ──────────────────────────────────────────────
  docs:
    build: ./docs
    ports:
      - "${DOCS_PORT}:${DOCS_PORT}"
    volumes:
      - ./docs:/app
      - /app/node_modules

volumes:
  mariadb_data:
  git_agent_target:
  cargo_registry:
  git_repos:
