# Public routes — JWT validation is skipped for these paths.
# The OAuth flow must be reachable before the user has a token.
public_routes:
  - /auth

# Proxied microservice routes.
# Values support ${VAR} / ${VAR:-default} env-var expansion so the same
# config works for local dev (set USERS_API_URL=http://localhost:6024 …) and
# inside Docker Compose (defaults below resolve to the service hostnames).
routes:
  /auth: ${USERS_API_URL:-http://users-api:6024}
  /users: ${USERS_API_URL:-http://users-api:6024}
  /sessions: ${SESSIONS_API_URL:-http://sessions-api:6023}
  /git: ${GIT_AGENT_URL:-http://git-agent:6025}
  /repositories: ${GIT_AGENT_URL:-http://git-agent:6025}
  /reviews: ${REVIEWS_API_URL:-http://reviews-api:6026}
  /tickets: ${TICKETS_API_URL:-http://tickets-api:6027}
